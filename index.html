<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4A90E2">
    <title>Bingo Book</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="icon-192.png">
</head>
<body>
    <!-- Entry List Page -->
    <div id="listPage" class="page active">
        <header>
            <h1>Bingo Book</h1>
            <button id="addEntryBtn" class="btn-primary">+ New Entry</button>
        </header>
        <div class="quick-search-container">
            <input type="text" id="quickSearchInput" placeholder="🔍 Quick search entries...">
            <button id="clearSearchBtn" class="clear-search-btn" style="display: none;">×</button>
        </div>
        <div class="backup-section">
            <button id="syncDownloadBtn" class="btn-backup">⬇ Sync Down</button>
            <button id="syncUploadBtn" class="btn-backup">⬆ Sync Up</button>
            <button id="restoreBtn" class="btn-backup">📋 Restore</button>
            <button id="updateBtn" class="btn-backup">🔄 Update App</button>
        </div>
        <div id="entriesList" class="entries-container"></div>
    </div>

    <!-- Entry Editor Page -->
    <div id="editorPage" class="page">
        <header>
            <button id="backBtn" class="btn-back">← Back</button>
            <h1 id="editorTitle">Entry</h1>
        </header>
        <div class="editor-container">
            <div class="form-group">
                <label>Unique ID</label>
                <input type="text" id="entryId" placeholder="e.g., success coaching">
            </div>
            <div id="fieldsContainer"></div>
            <button id="addFieldBtn" class="btn-secondary">+ Add Field</button>
            <div class="actions">
                <button id="saveBtn" class="btn-primary">Save Entry</button>
                <button id="deleteBtn" class="btn-danger">Delete Entry</button>
            </div>
        </div>
    </div>

    <!-- Search Page -->
    <div id="searchPage" class="page">
        <header>
            <h1>Search & Replace</h1>
        </header>
        <div class="search-container">
            <div class="search-section">
                <h3 class="section-title">Exact Search</h3>
                <div class="form-group">
                    <label>Search by Key</label>
                    <input type="text" id="searchKey" placeholder="e.g., area">
                </div>
                <div class="form-group">
                    <label>Search by Value</label>
                    <div class="search-value-container">
                        <input type="text" id="searchValue" placeholder="e.g., Kaliganj">
                        <button id="replaceToggleBtn" class="replace-toggle-btn" title="Find & Replace">⚙️</button>
                    </div>
                    <div id="replaceInputs" class="replace-inputs" style="display: none;">
                        <input type="text" id="replaceValue" placeholder="Replace with...">
                        <button id="executeReplaceBtn" class="btn-replace">Replace All</button>
                    </div>
                </div>
                <button id="searchBtn" class="btn-primary">Search</button>
            </div>
            
            <div class="search-divider"></div>
            
            <div class="search-section">
                <h3 class="section-title">Partial Match Search</h3>
                <div class="form-group">
                    <label>Select Key</label>
                    <input type="text" id="partialSearchKey" placeholder="e.g., name, city, status">
                </div>
                <div class="form-group">
                    <label>Query</label>
                    <input type="text" id="partialSearchQuery" placeholder="Enter search query">
                </div>
                <button id="partialSearchBtn" class="btn-primary">Partial Search</button>
            </div>
            
            <div id="searchResults" class="entries-container"></div>
        </div>
    </div>

    <!-- Schema Page -->
    <div id="schemaPage" class="page">
        <header>
            <h1>Schema Management</h1>
        </header>
        <div class="schema-container">
            <div class="schema-info">
                <p>Manage the global schema for all entries. Adding a key will add it to all entries, removing a key will delete it from all entries.</p>
            </div>
            <div class="schema-actions">
                <button id="addSchemaKeyBtn" class="btn-primary">+ Add Key</button>
            </div>
            <div id="schemaKeysList" class="schema-keys-list"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-page="listPage">
            <span>📋</span>
            <span>Entries</span>
        </button>
        <button class="nav-btn" data-page="searchPage">
            <span>🔍</span>
            <span>Search</span>
        </button>
        <button class="nav-btn" data-page="schemaPage">
            <span>🗂️</span>
            <span>Schema</span>
        </button>
    </nav>

    <!-- Restore Modal -->
    <div id="restoreModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Restore from Version History</h2>
                <button id="closeModal" class="btn-close">×</button>
            </div>
            <div id="versionsList" class="versions-container">
                <div class="loading">Loading versions...</div>
            </div>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
