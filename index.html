<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4A90E2">
    <title>Bingo Book</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="icon-192.png">
</head>
<body>
    <!-- Entry List Page -->
    <div id="listPage" class="page active">
        <header>
            <h1>Bingo Book</h1>
            <button id="addEntryBtn" class="btn-primary">+ New Entry</button>
        </header>
        <div class="backup-section">
            <button id="syncDownloadBtn" class="btn-backup">⬇ Sync Down</button>
            <button id="syncUploadBtn" class="btn-backup">⬆ Sync Up</button>
            <button id="restoreBtn" class="btn-backup">📋 Restore</button>
            <button id="updateBtn" class="btn-backup">🔄 Update App</button>
        </div>
        <div id="entriesList" class="entries-container"></div>
    </div>

    <!-- Entry Editor Page -->
    <div id="editorPage" class="page">
        <header>
            <button id="backBtn" class="btn-back">← Back</button>
            <h1 id="editorTitle">Entry</h1>
        </header>
        <div class="editor-container">
            <div class="form-group">
                <label>Unique ID</label>
                <input type="text" id="entryId" placeholder="e.g., success coaching">
            </div>
            <div id="fieldsContainer"></div>
            <button id="addFieldBtn" class="btn-secondary">+ Add Field</button>
            <div class="actions">
                <button id="saveBtn" class="btn-primary">Save Entry</button>
                <button id="deleteBtn" class="btn-danger">Delete Entry</button>
            </div>
        </div>
    </div>

    <!-- Search Page -->
    <div id="searchPage" class="page">
        <header>
            <h1>Search</h1>
        </header>
        <div class="search-container">
            <div class="form-group">
                <label>Search by Key</label>
                <input type="text" id="searchKey" placeholder="e.g., area">
            </div>
            <div class="form-group">
                <label>Search by Value</label>
                <input type="text" id="searchValue" placeholder="e.g., Kaliganj">
            </div>
            <button id="searchBtn" class="btn-primary">Search</button>
            <div id="searchResults" class="entries-container"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-page="listPage">
            <span>📋</span>
            <span>Entries</span>
        </button>
        <button class="nav-btn" data-page="searchPage">
            <span>🔍</span>
            <span>Search</span>
        </button>
    </nav>

    <!-- Restore Modal -->
    <div id="restoreModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Restore from Version History</h2>
                <button id="closeModal" class="btn-close">×</button>
            </div>
            <div id="versionsList" class="versions-container">
                <div class="loading">Loading versions...</div>
            </div>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
